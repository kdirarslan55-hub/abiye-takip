<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abiye Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;}
.header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0d8;position:sticky;top:0;z-index:10;}
.header h1{font-size:16px;font-weight:600;margin-bottom:8px;}
.role-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.role-label{font-size:11px;color:#888;}
.role-btn{padding:5px 12px;border-radius:20px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:#fff;color:#555;transition:all .15s;}
.role-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500;}
.role-btn.yonetici.active{background:#2e7d32;border-color:#2e7d32;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0d8;}
.tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;color:#888;border-bottom:2px solid transparent;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;}
.marka-header{background:#f0efe8;padding:7px 14px;font-size:11px;font-weight:600;color:#666;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e0e0d8;}
.urun-card{background:#fff;border-bottom:1px solid #eeeeea;padding:11px 14px;display:flex;gap:10px;align-items:flex-start;}
.urun-img{width:72px;height:96px;object-fit:cover;border-radius:6px;flex-shrink:0;background:#f0f0f0;}
.urun-img-placeholder{width:72px;height:96px;border-radius:6px;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.urun-body{flex:1;min-width:0;}
.urun-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px;}
.urun-kod{font-size:10px;color:#aaa;margin-bottom:1px;}
.urun-ad{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3;}
.urun-detay{font-size:11px;color:#888;margin-top:2px;line-height:1.4;}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-weight:500;}
.badge-iade{background:#fdecea;color:#c62828;}
.badge-iste{background:#fff8e1;color:#e65100;}
.votes-row{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0 6px;}
.vote-chip{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}
.chip-iste{background:#fff3e0;color:#e65100;}
.chip-iade{background:#fdecea;color:#c62828;}
.chip-pas{background:#f0f0f0;color:#888;}
.btn-row{display:flex;gap:5px;}
.vbtn{padding:6px 10px;border-radius:8px;border:1px solid #ddd;font-size:11px;font-weight:500;cursor:pointer;background:#fff;color:#555;transition:all .15s;flex:1;}
.vbtn:active{transform:scale(.97);}
.vbtn.sel-iste{background:#fff3e0;border-color:#ff9800;color:#e65100;}
.vbtn.sel-iade{background:#fdecea;border-color:#ef5350;color:#c62828;}
.vbtn.sel-pas{background:#f0f0f0;border-color:#bbb;color:#666;}
.screen{display:none;}
.screen.active{display:block;}
.ozet-wrap{padding:12px 14px;}
.ozet-section{margin-bottom:16px;}
.ozet-section-title{font-size:11px;font-weight:700;margin-bottom:8px;padding:5px 8px;border-radius:6px;}
.st-iste{background:#fff3e0;color:#e65100;}
.st-iade{background:#fdecea;color:#c62828;}
.ozet-item{padding:8px 10px;background:#fff;border-radius:8px;margin-bottom:5px;border:1px solid #eee;display:flex;gap:8px;align-items:flex-start;}
.ozet-item-img{width:40px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#f0f0f0;}
.ozet-item-info{flex:1;}
.ozet-item-ad{font-size:12px;font-weight:600;margin-bottom:3px;}
.ozet-item-detay{font-size:10px;color:#888;margin-bottom:4px;}
.ozet-chips{display:flex;gap:4px;flex-wrap:wrap;}
.wa-btn{display:block;width:100%;padding:12px;background:#25d366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;text-align:center;}
.empty{padding:20px;text-align:center;color:#aaa;font-size:12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-left:6px;vertical-align:middle;}
.sync-dot.ok{background:#4caf50;}
</style>
</head>
<body>
<div class="header">
  <h1>🗂 Abiye Takip <span class="sync-dot" id="sync-dot"></span></h1>
  <div class="role-bar">
    <span class="role-label">Ben:</span>
    <button class="role-btn active" onclick="setRole(this,'Şura')">Şura</button>
    <button class="role-btn" onclick="setRole(this,'Ebru')">Ebru</button>
    <button class="role-btn" onclick="setRole(this,'Sema')">Sema</button>
    <button class="role-btn" onclick="setRole(this,'Öznur')">Öznur</button>
    <button class="role-btn yonetici" onclick="setRole(this,'Yönetici')">👑 Yönetici</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="setTab(this,'oylama')">Oylama</div>
  <div class="tab" onclick="setTab(this,'ozet')">Özet</div>
</div>
<div id="screen-oylama" class="screen active">
  <div id="urun-list"></div>
</div>
<div id="screen-ozet" class="screen">
  <div class="ozet-wrap">
    <div class="ozet-section">
      <div class="ozet-section-title st-iste">⬆ İstenecek Ürünler</div>
      <div id="ozet-iste"></div>
    </div>
    <div class="ozet-section">
      <div class="ozet-section-title st-iade">↩ İade / Pas Ürünler</div>
      <div id="ozet-iade"></div>
    </div>
    <button class="wa-btn" onclick="whatsapp()">📲 WhatsApp Özeti Gönder</button>
  </div>
</div>

let currentRole = 'Şura';
let votes = {};

async function loadVotes() {
  try {
    const r = await fetch('/api/votes');
    votes = await r.json();
    document.getElementById('sync-dot').className = 'sync-dot ok';
    renderAll();
  } catch(e) {
    document.getElementById('sync-dot').className = 'sync-dot';
  }
}

async function sendVote(idx, oy) {
  if (currentRole === 'Yönetici') return;
  if (!votes[idx]) votes[idx] = {};
  const prev = votes[idx][currentRole];
  if (prev === oy) {
    delete votes[idx][currentRole];
    await fetch('/api/vote', {method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({urun_idx:idx, kisi:currentRole})});
  } else {
    votes[idx][currentRole] = oy;
    await fetch('/api/vote', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({urun_idx:idx, kisi:currentRole, oy})});
  }
  renderAll();
}

function setRole(btn, role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function setTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'ozet') renderOzet();
}

function imgTag(kod, cls) {
  const src = getGorsel(kod);
  if (src) return `<img src="${src}" class="${cls}" loading="lazy">`;
  return `<div class="${cls.replace('img','img-placeholder')}">👗</div>`;
}

function renderAll() {
  const markas = [...new Set(URUNLER.map(u => u.marka))];
  let html = '';
  markas.forEach(m => {
    html += `<div class="marka-header">${m}</div>`;
    URUNLER.forEach((u, i) => {
      if (u.marka !== m) return;
      const myVote = votes[i] && votes[i][currentRole];
      const isYonetici = currentRole === 'Yönetici';
      let badge = '';
      if (u.durum === 'iade') badge = '<span class="badge badge-iade">↩ İade</span>';
      else if (u.durum === 'iste') badge = '<span class="badge badge-iste">⬆ İste</span>';

      let chips = '';
      if (votes[i] && Object.keys(votes[i]).length) {
        chips = '<div class="votes-row">';
        Object.entries(votes[i]).forEach(([k,v]) => {
          const cls = v==='iste'?'chip-iste':v==='iade'?'chip-iade':'chip-pas';
          const ico = v==='iste'?'⬆':v==='iade'?'↩':'—';
          chips += `<span class="vote-chip ${cls}">${ico} ${k}</span>`;
        });
        chips += '</div>';
      }

      let btns = '';
      if (!isYonetici) {
        btns = `<div class="btn-row">
          <button class="vbtn${myVote==='iste'?' sel-iste':''}" onclick="sendVote(${i},'iste')">⬆ İste</button>
          <button class="vbtn${myVote==='iade'?' sel-iade':''}" onclick="sendVote(${i},'iade')">↩ İade</button>
          <button class="vbtn${myVote==='pas'?' sel-pas':''}" onclick="sendVote(${i},'pas')">— Pas</button>
        </div>`;
      }

      html += `<div class="urun-card">
        ${imgTag(u.kod, 'urun-img')}
        <div class="urun-body">
          <div class="urun-top">
            <div>
              <div class="urun-kod">${u.kod}</div>
              <div class="urun-ad">${u.ad} — ${u.renk}</div>
              <div class="urun-detay">Beden: ${u.beden}${u.not?' · '+u.not:''}</div>
            </div>
            ${badge}
          </div>
          ${chips}${btns}
        </div>
      </div>`;
    });
  });
  document.getElementById('urun-list').innerHTML = html;
}

function renderOzet() {
  let isteHtml = '', iadeHtml = '';
  URUNLER.forEach((u, i) => {
    if (!votes[i] || !Object.keys(votes[i]).length) return;
    const isteK = Object.entries(votes[i]).filter(([,v])=>v==='iste').map(([k])=>k);
    const iadeK = Object.entries(votes[i]).filter(([,v])=>v==='iade').map(([k])=>k);
    const img = imgTag(u.kod, 'ozet-item-img');
    if (isteK.length) {
      isteHtml += `<div class="ozet-item">${img}<div class="ozet-item-info">
        <div class="ozet-item-ad">${u.ad} — ${u.renk} (${u.marka})</div>
        <div class="ozet-item-detay">${u.kod}${u.not?' · '+u.not:''}</div>
        <div class="ozet-chips">${isteK.map(k=>`<span class="vote-chip chip-iste">⬆ ${k}</span>`).join('')}</div>
      </div></div>`;
    }
    if (iadeK.length) {
      iadeHtml += `<div class="ozet-item">${img}<div class="ozet-item-info">
        <div class="ozet-item-ad">${u.ad} — ${u.renk} (${u.marka})</div>
        <div class="ozet-chips">${iadeK.map(k=>`<span class="vote-chip chip-iade">↩ ${k}</span>`).join('')}</div>
      </div></div>`;
    }
  });
  document.getElementById('ozet-iste').innerHTML = isteHtml || '<div class="empty">Henüz oy yok.</div>';
  document.getElementById('ozet-iade').innerHTML = iadeHtml || '<div class="empty">Henüz oy yok.</div>';
}

function whatsapp() {
  let msg = '🗂 *ABİYE TOPLANTI ÖZETİ*\n\n';
  let isteVar = false, iadeVar = false;
  URUNLER.forEach((u, i) => {
    if (!votes[i]) return;
    const isteK = Object.entries(votes[i]).filter(([,v])=>v==='iste').map(([k])=>k);
    if (isteK.length) { if(!isteVar){msg+='⬆ *İSTENECEKLER*\n';isteVar=true;} msg+=`• ${u.ad} ${u.renk} (${u.marka}) — ${isteK.join(', ')}\n`; }
  });
  msg += '\n';
  URUNLER.forEach((u, i) => {
    if (!votes[i]) return;
    const iadeK = Object.entries(votes[i]).filter(([,v])=>v==='iade').map(([k])=>k);
    if (iadeK.length) { if(!iadeVar){msg+='↩ *İADE*\n';iadeVar=true;} msg+=`• ${u.ad} ${u.renk} (${u.marka}) — ${iadeK.join(', ')}\n`; }
  });
  window.open('https://wa.me/?text=' + encodeURIComponent(msg));
}

loadVotes();
setInterval(loadVotes, 15000);
